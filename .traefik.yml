displayName: Maintenance Mode Plugin (m8ce)

type: middleware

import: github.com/CitronusAcademy/traefik-maintenance-plugin

summary: "Puts a service into maintenance mode. Polls an HTTP API in the background for status and an IP whitelist, blocks traffic while maintenance is active, and exempts whitelisted clients, hosts and paths."

iconPath: .assets/icon.png

testData:
  environmentEndpoints:
    "": "https://maintenance-api.example.com/v1/configurations/"
  environmentSecrets:
    "":
      header: "X-Plugin-Secret"
      value: "example-secret-token"
  cacheDurationInSeconds: 10
  requestTimeoutInSeconds: 5
  maintenanceStatusCode: 512
  skipPrefixes:
    - "/admin"
  skipHosts:
    - "admin.example.com"
    - "*.internal.example.com"
  allowHTMLWhenMaintenance: true
  allowStaticExtensions:
    - ".js"
    - ".css"
    - ".svg"
    - ".ico"
    - ".png"
  allowedOrigins:
    - "https://app.example.com"
  corsAllowAnyOrigin: false
  trustedProxies:
    - "173.245.48.0/20"
  strictAssetMatching: true
  maintenanceResponseBody: "<h1>We'll be right back</h1>"
  maintenanceContentType: "text/html; charset=utf-8"
  retryAfterSeconds: 120
  maintenanceCacheControl: "no-store"
  debug: false

id: maintenanceCheck
