name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod
      - name: Vet
        run: go vet ./...
      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  yaegi:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: "on"
      GOPATH: ${{ github.workspace }}/go
      YAEGI_VERSION: v0.16.1
    steps:
      - uses: actions/checkout@v4
        with:
          path: go/src/github.com/${{ github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/src/github.com/${{ github.repository }}/go.mod
      - name: Install Yaegi
        run: curl -sfL https://raw.githubusercontent.com/traefik/yaegi/master/install.sh | bash -s -- -b "$(go env GOPATH)/bin" "${YAEGI_VERSION}"
      - name: Yaegi test
        working-directory: go/src/github.com/${{ github.repository }}
        run: "$(go env GOPATH)/bin/yaegi test -v ."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
