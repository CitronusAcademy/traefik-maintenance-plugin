name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false # no go.sum: the plugin has zero external dependencies
      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod
      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Convert to lcov
        run: |
          go install github.com/jandelgado/gcov2lcov@latest
          gcov2lcov -infile coverage.out -outfile coverage.lcov
      - name: Coverage gate (line coverage, matches Codecov)
        run: |
          pct=$(awk -F: '/^LF:/{f+=$2}/^LH:/{h+=$2}END{printf "%.1f",100*h/f}' coverage.lcov)
          echo "line coverage: $pct%"
          awk "BEGIN{exit !($pct>=90)}" || { echo "below 90% line coverage"; exit 1; }
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  yaegi:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: "on"
      GOPATH: ${{ github.workspace }}/go
      YAEGI_VERSION: v0.16.1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: go/src/github.com/${{ github.repository }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go/src/github.com/${{ github.repository }}/go.mod
          cache: false # no go.sum: the plugin has zero external dependencies
      - name: Install Yaegi
        run: curl -sfL https://raw.githubusercontent.com/traefik/yaegi/master/install.sh | bash -s -- -b "$(go env GOPATH)/bin" "${YAEGI_VERSION}"
      - name: Yaegi test
        working-directory: go/src/github.com/${{ github.repository }}
        # Tests that exercise compiled-to-interpreted callback boundaries (e.g.
        # http.Server.ConnState) deadlock under the interpreter, so they skip
        # themselves at runtime via runningUnderYaegi(); they run under the
        # regular `go test` job instead. (Yaegi ignores //go:build tags, so the
        # skip must be a runtime guard rather than a build constraint.)
        run: "$(go env GOPATH)/bin/yaegi test -v ."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false # no go.sum: the plugin has zero external dependencies
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false # no go.sum: the plugin has zero external dependencies
      # Run govulncheck directly (rather than govulncheck-action) so it uses the
      # go.mod toolchain floor — the version required for a clean result.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
